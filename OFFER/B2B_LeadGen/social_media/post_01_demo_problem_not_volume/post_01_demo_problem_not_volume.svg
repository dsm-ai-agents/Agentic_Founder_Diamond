<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B0F14"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#090A0C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(846 210) rotate(124) scale(575 575)">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.45"/>
      <stop offset="0.42" stop-color="#F97316" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="54" height="54" patternUnits="userSpaceOnUse">
      <path d="M54 0H0V54" stroke="#FFFFFF" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="35" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#glow)"/>
  <rect width="1080" height="1080" fill="url(#grid)"/>

  <circle cx="900" cy="146" r="170" stroke="#F97316" stroke-opacity="0.28" stroke-width="2"/>
  <circle cx="900" cy="146" r="94" fill="#F97316" fill-opacity="0.10"/>

  <rect x="86" y="86" width="908" height="908" rx="52" fill="#0F172A" fill-opacity="0.76" stroke="#FFFFFF" stroke-opacity="0.10" filter="url(#shadow)"/>

  <text x="128" y="158" fill="#F97316" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="3">B2B LEAD GENERATION</text>

  <text x="128" y="302" fill="#FFFFFF" font-family="Georgia, 'Times New Roman', serif" font-size="82" font-weight="700">
    <tspan x="128" dy="0">Your demo</tspan>
    <tspan x="128" dy="94">problem is</tspan>
    <tspan x="128" dy="94">not volume.</tspan>
  </text>

  <line x1="128" y1="606" x2="952" y2="606" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>

  <text x="128" y="690" fill="#E5E7EB" font-family="Verdana, Geneva, sans-serif" font-size="33" font-weight="400">
    <tspan x="128" dy="0">Most teams do not need more leads.</tspan>
    <tspan x="128" dy="50">They need fewer bad-fit calls.</tspan>
  </text>

  <rect x="128" y="792" width="824" height="104" rx="24" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.12"/>
  <text x="162" y="835" fill="#CBD5E1" font-family="Verdana, Geneva, sans-serif" font-size="24" font-weight="400">
    <tspan x="162" dy="0">If reps spend half the demo educating from zero,</tspan>
    <tspan x="162" dy="36">targeting broke before the pitch began.</tspan>
  </text>

  <rect x="128" y="926" width="508" height="58" rx="29" fill="#F97316"/>
  <text x="158" y="964" fill="#111827" font-family="Verdana, Geneva, sans-serif" font-size="22" font-weight="700">Download the ICP Fit Checklist</text>

  <text x="910" y="963" text-anchor="end" fill="#94A3B8" font-family="Verdana, Geneva, sans-serif" font-size="18" letter-spacing="1.4">QUALIFY BEFORE CALENDAR</text>
</svg>
